name: Build Windows EXE

# 每次 push 到 main 分支触发打包
on:
  push:
    branches: [ main ]

jobs:
  build:

    # 在 Windows 最新虚拟机上运行
    runs-on: windows-latest

    steps:
    # 1️⃣ 获取代码
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ 设置 Python 3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 3️⃣ 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4️⃣ 打包 exe
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller -F -w -i B16_flag_icon.ico main.py

    # 5️⃣ 上传生成的 exe 作为 artifact
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: B16-smart-class
        path: dist/*.exe
